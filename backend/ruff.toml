target-version = "py312"
line-length = 99

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "S",    # flake8-bandit (security)
    "T20",  # flake8-print (no print statements)
    "RUF",  # ruff-specific
]
ignore = [
    "S101",  # allow assert in tests
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S106"]

[format]
quote-style = "double"
indent-style = "space"
